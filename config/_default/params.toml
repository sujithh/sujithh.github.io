showReadingTime = true
showTags = false
showPagination = true
invertPagination = true
showToC = true
openToC = false
showComments = false
showBreadcrumbs = false

[list]
groupByYear = false
showBreadcrumbs = false
cardView = true
showThumbnail = false
showRSS = true

[term]
groupByYear = false
showBreadcrumbs = false
cardView = true
showRSS = false

[taxonomy]
showCount = true
cardView = true

[[social]]
