description = "Random scribbles of Sujith H"
copyright = "Sujith Haridasan"
optimizeImg = true
enableCodeCopy = true
showThemeSwitcher = true
defaultTheme = "auto"
highlightCurrentMenu = true
mainSections = ["posts"]
removeAttribution = false
lastUpdate = false
showHeadingAnchors = true
enableSearch = true

[homepage]
showRecent = true
showRecentLabel = "Latest Posts"
